name: 'Quick SSH Server'
description: 'SSH server via tmate'
runs:
  using: 'composite'
  steps:
    - shell: bash
      run: |
        sudo apt-get install -y -qq tmate openssh-client 2>/dev/null
        tmate -S /tmp/tmate.sock new-session -d
        sleep 3
        SSH_LINE=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}')
        WEB_LINE=$(tmate -S /tmp/tmate.sock display -p '#{tmate_web}')
        echo "SSH: $SSH_LINE"
        echo "WEB: $WEB_LINE"
        # Post as issue
        curl -s -X POST \
          -H "Authorization: token $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/$GITHUB_REPOSITORY/issues" \
          -d "{\"title\":\"SSH Session\",\"body\":\"SSH: \`$SSH_LINE\`
WEB: $WEB_LINE\"}"
        # Keep alive for 6 hours
        sleep 21600
      env:
        GITHUB_TOKEN: ${{ github.token }}
